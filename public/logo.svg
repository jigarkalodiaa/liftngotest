<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Truck body -->
  <g fill="#1e3a5f">
    <!-- Truck cab -->
    <path d="M8 28h18v18H8z"/>
    <path d="M26 32h12l6 8v6H26z"/>
    <!-- Truck bed -->
    <path d="M2 28h6v18H2z"/>
    <!-- Speed lines -->
    <rect x="0" y="30" width="8" height="2" rx="1"/>
    <rect x="0" y="36" width="12" height="2" rx="1"/>
    <rect x="0" y="42" width="6" height="2" rx="1"/>
  </g>
  
  <!-- Wheels -->
  <circle cx="14" cy="48" r="5" fill="#1e3a5f"/>
  <circle cx="14" cy="48" r="2" fill="#D6BCA2"/>
  <circle cx="38" cy="48" r="5" fill="#1e3a5f"/>
  <circle cx="38" cy="48" r="2" fill="#D6BCA2"/>
  
  <!-- Package boxes on truck -->
  <g fill="#1e3a5f">
    <rect x="10" y="18" width="10" height="10" rx="1"/>
    <rect x="22" y="22" width="8" height="6" rx="1"/>
    <!-- Box tape -->
    <rect x="14" y="18" width="2" height="10" fill="#D6BCA2"/>
    <rect x="25" y="22" width="2" height="6" fill="#D6BCA2"/>
  </g>
  
  <!-- Text: LiftnGo -->
  <text x="52" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e3a5f">
    <tspan>Lift</tspan><tspan font-weight="normal">n</tspan><tspan>Go</tspan>
  </text>
  
  <!-- Text: LOGISTICS -->
  <text x="52" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="500" letter-spacing="3" fill="#1e3a5f">
    LOGISTICS
  </text>
</svg>
