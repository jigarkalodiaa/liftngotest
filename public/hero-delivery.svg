<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background elements -->
  <ellipse cx="200" cy="280" rx="180" ry="20" fill="#FED7AA" opacity="0.3"/>
  
  <!-- Delivery person -->
  <g transform="translate(80, 60)">
    <!-- Body -->
    <rect x="20" y="80" width="60" height="80" rx="10" fill="#F97316"/>
    <!-- Head -->
    <circle cx="50" cy="50" r="30" fill="#FBBF24"/>
    <!-- Face -->
    <circle cx="40" cy="45" r="4" fill="#1F2937"/>
    <circle cx="60" cy="45" r="4" fill="#1F2937"/>
    <path d="M42 58 Q50 65 58 58" stroke="#1F2937" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Cap -->
    <path d="M20 40 Q50 20 80 40" fill="#EA580C"/>
    <rect x="25" y="35" width="50" height="8" rx="2" fill="#EA580C"/>
    <!-- Arms -->
    <rect x="0" y="90" width="20" height="50" rx="8" fill="#FBBF24"/>
    <rect x="80" y="90" width="20" height="50" rx="8" fill="#FBBF24"/>
    <!-- Legs -->
    <rect x="25" y="155" width="20" height="40" rx="8" fill="#3B82F6"/>
    <rect x="55" y="155" width="20" height="40" rx="8" fill="#3B82F6"/>
    <!-- Shoes -->
    <ellipse cx="35" cy="200" rx="15" ry="8" fill="#1F2937"/>
    <ellipse cx="65" cy="200" rx="15" ry="8" fill="#1F2937"/>
  </g>
  
  <!-- Delivery bag -->
  <g transform="translate(160, 100)">
    <rect x="0" y="20" width="80" height="70" rx="8" fill="#F97316"/>
    <rect x="10" y="30" width="60" height="50" rx="4" fill="#FED7AA"/>
    <rect x="25" y="0" width="30" height="25" rx="4" fill="#EA580C"/>
    <text x="40" y="60" text-anchor="middle" fill="#F97316" font-size="20" font-weight="bold">L</text>
  </g>
  
  <!-- Customer -->
  <g transform="translate(260, 80)">
    <!-- Body -->
    <rect x="20" y="70" width="50" height="70" rx="10" fill="#8B5CF6"/>
    <!-- Head -->
    <circle cx="45" cy="45" r="25" fill="#FBBF24"/>
    <!-- Hair -->
    <path d="M20 35 Q45 10 70 35 Q70 25 45 20 Q20 25 20 35" fill="#7C3AED"/>
    <!-- Face -->
    <circle cx="36" cy="42" r="3" fill="#1F2937"/>
    <circle cx="54" cy="42" r="3" fill="#1F2937"/>
    <path d="M38 52 Q45 58 52 52" stroke="#1F2937" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Arms reaching -->
    <rect x="0" y="75" width="20" height="40" rx="8" fill="#FBBF24" transform="rotate(-30 10 95)"/>
    <rect x="70" y="75" width="20" height="40" rx="8" fill="#FBBF24" transform="rotate(30 80 95)"/>
    <!-- Legs -->
    <rect x="25" y="135" width="18" height="35" rx="6" fill="#EC4899"/>
    <rect x="47" y="135" width="18" height="35" rx="6" fill="#EC4899"/>
    <!-- Shoes -->
    <ellipse cx="34" cy="175" rx="12" ry="6" fill="#1F2937"/>
    <ellipse cx="56" cy="175" rx="12" ry="6" fill="#1F2937"/>
  </g>
  
  <!-- Floating elements -->
  <circle cx="50" cy="50" r="8" fill="#FCD34D" opacity="0.6"/>
  <circle cx="350" cy="80" r="6" fill="#F97316" opacity="0.6"/>
  <circle cx="320" cy="40" r="4" fill="#8B5CF6" opacity="0.6"/>
  
  <!-- Food items floating -->
  <g transform="translate(300, 120)">
    <circle cx="0" cy="0" r="15" fill="#EF4444"/>
    <circle cx="0" cy="0" r="10" fill="#FCA5A5"/>
    <circle cx="-3" cy="-2" r="3" fill="#7F1D1D"/>
  </g>
  
  <g transform="translate(340, 160)">
    <rect x="-12" y="-8" width="24" height="16" rx="3" fill="#FBBF24"/>
    <rect x="-8" y="-4" width="16" height="8" rx="2" fill="#FEF3C7"/>
  </g>
</svg>
